  <text x="700" y="44" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#18181B" letter-spacing="-0.5">Vocab — System Architecture</text>
  <text x="700" y="70" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#71717A">Layered architecture: Screens → Hooks/Stores → Services → External Systems · Pipeline as an independent batch process</text>

