name: React Native CI

on:
  push:
    branches: [ main, Kia ]
  pull_request:
    branches: [ main, Kia ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run tsc --if-present

      - name: Lint
        run: npm run lint --if-present
